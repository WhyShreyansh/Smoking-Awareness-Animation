<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<title>SMOKING IS INJURIOUS TO HEALTH</title>

</head>
<body>

<div id="cursor"></div>

<!-- Scroll hint -->
<div id="scroll-hint">↓ scroll to watch the story unfold ↓</div>

<!-- Progress dots -->
<div id="progress-bar">
  <div class="prog-dot active" data-n="01"></div>
  <div class="prog-line"></div>
  <div class="prog-dot" data-n="02"></div>
  <div class="prog-line"></div>
  <div class="prog-dot" data-n="03"></div>
  <div class="prog-line"></div>
  <div class="prog-dot" data-n="04"></div>
  <div class="prog-line"></div>
  <div class="prog-dot" data-n="05"></div>
  <div class="prog-line"></div>
  <div class="prog-dot" data-n="06"></div>
</div>

<div id="scroll-container">
  <div id="scene">
    <div id="spotlight"></div>
    <canvas id="smoke-canvas"></canvas>
    <div id="ember-glow"></div>

    <!-- Scene label -->
    <div class="scene-label" id="scene-label" style="opacity:1;">
      <div class="num" id="label-num">01</div>
      <div class="title" id="label-title">ONE CIGARETTE. IT STARTS.</div>
    </div>

    <!-- Cigarette -->
    <div id="cigarette-wrap">
      <svg id="cigarette-svg" viewBox="0 0 44 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="filterGrad" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0%" stop-color="#c8a06a"/>
            <stop offset="30%" stop-color="#e8c890"/>
            <stop offset="60%" stop-color="#d4aa72"/>
            <stop offset="100%" stop-color="#b89050"/>
          </linearGradient>
          <linearGradient id="paperGrad" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0%" stop-color="#d8d0c0"/>
            <stop offset="40%" stop-color="#f0ece0"/>
            <stop offset="70%" stop-color="#e0d8c8"/>
            <stop offset="100%" stop-color="#c8c0b0"/>
          </linearGradient>
          <linearGradient id="tipGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#ff8c00"/>
            <stop offset="50%" stop-color="#cc4400"/>
            <stop offset="100%" stop-color="#661100"/>
          </linearGradient>
          <filter id="cig-shadow">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
          </filter>
          <radialGradient id="ashGrad" cx="50%" cy="50%">
            <stop offset="0%" stop-color="#888"/>
            <stop offset="100%" stop-color="#555"/>
          </radialGradient>
        </defs>
        <!-- Filter (orange/tan) section -->
        <rect id="cig-filter" x="4" y="188" width="36" height="88" rx="4" fill="url(#filterGrad)" filter="url(#cig-shadow)"/>
        <!-- Filter band -->
        <rect x="4" y="185" width="36" height="5" rx="1" fill="#b07830" opacity="0.7"/>
        <!-- Paper body -->
        <rect id="cig-paper" x="4" y="18" width="36" height="168" rx="2" fill="url(#paperGrad)" filter="url(#cig-shadow)"/>
        <!-- Paper lines -->
        <line x1="4" y1="60" x2="40" y2="60" stroke="#ccc" stroke-width="0.4" opacity="0.4"/>
        <line x1="4" y1="100" x2="40" y2="100" stroke="#ccc" stroke-width="0.4" opacity="0.4"/>
        <line x1="4" y1="140" x2="40" y2="140" stroke="#ccc" stroke-width="0.4" opacity="0.4"/>
        <!-- Tip / ember -->
        <ellipse id="cig-tip" cx="22" cy="13" rx="17" ry="13" fill="url(#tipGrad)"/>
        <!-- Ash cap -->
        <ellipse id="cig-ash" cx="22" cy="13" rx="17" ry="13" fill="url(#ashGrad)" opacity="0"/>
        <!-- Highlight -->
        <rect x="8" y="25" width="6" height="140" rx="3" fill="white" opacity="0.08"/>
      </svg>
    </div>

    <!-- Ember glow positioned by JS -->

    <!-- Human silhouette (side profile facing left, so cigarette enters from left) -->
    <div id="human-wrap">
      <svg id="human-svg" viewBox="0 0 340 520" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="humanGlow" cx="40%" cy="30%">
            <stop offset="0%" stop-color="#2a1e10" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
          </radialGradient>
          <filter id="human-blur">
            <feGaussianBlur stdDeviation="1.5"/>
          </filter>
        </defs>
        <!-- Soft rim light behind -->
        <ellipse cx="160" cy="220" rx="120" ry="200" fill="url(#humanGlow)"/>
        <!-- Neck -->
        <rect x="130" y="210" width="55" height="90" rx="10" fill="#1a1410"/>
        <!-- Head / face profile (facing left) -->
        <path d="
          M 200 60
          C 230 55, 260 80, 265 120
          C 270 160, 255 200, 240 215
          C 230 225, 220 230, 210 228
          L 195 225
          C 185 230, 175 238, 168 245
          C 160 240, 148 228, 145 218
          C 138 205, 136 190, 140 175
          C 130 165, 125 148, 128 130
          C 132 108, 145 90, 160 78
          Z" fill="#1c1610" filter="url(#human-blur)"/>
        <!-- Jaw/chin prominence -->
        <path d="M 145 218 C 140 225, 138 235, 143 242 C 148 248, 158 250, 165 246" fill="#181410"/>
        <!-- Nose -->
        <path d="M 265 130 C 275 135, 278 148, 272 158 C 268 163, 262 164, 258 160" fill="#161210" stroke="#252010" stroke-width="1" opacity="0.6"/>
        <!-- Lips / mouth area – cigarette placement -->
        <path d="M 258 185 C 262 183, 265 184, 264 188 C 263 192, 258 193, 254 191" fill="#201810" opacity="0.8"/>
        <!-- Ear -->
        <path d="M 148 148 C 140 150, 135 160, 137 172 C 139 182, 145 186, 150 183" fill="none" stroke="#251e14" stroke-width="4" opacity="0.5"/>
        <!-- Hair -->
        <path d="M 160 78 C 168 58, 185 48, 208 50 C 228 52, 246 62, 252 78" fill="#111008" stroke="#111008" stroke-width="2"/>
        <!-- Body / shoulder -->
        <path d="M 145 240 C 130 255, 110 280, 95 320 C 80 360, 75 400, 78 450 L 260 450 C 260 400, 255 360, 248 320 C 238 280, 225 255, 210 240 Z" fill="#111008" filter="url(#human-blur)"/>
        <!-- Rim light on face edge -->
        <path d="M 200 62 C 228 56, 260 82, 264 122 C 268 155, 254 200, 242 215" fill="none" stroke="rgba(200,136,42,0.12)" stroke-width="3"/>
      </svg>
    </div>

    <!-- Warning text -->
    <div id="warning-text">
      <span class="line1">SMOKING IS</span>
      <span class="line2">INJURIOUS TO HEALTH</span>
    </div>
  </div>
</div>

<script>
// ─── CURSOR ──────────────────────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// ─── SMOKE SYSTEM ────────────────────────────────────────────────────────────
const canvas = document.getElementById('smoke-canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resizeCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Perlin-ish noise helper (simple value noise)
const _noise_p = [];
for (let i = 0; i < 256; i++) _noise_p[i] = Math.random();
function noise(x, y) {
  const xi = Math.floor(x) & 255, yi = Math.floor(y) & 255;
  const xf = x - Math.floor(x), yf = y - Math.floor(y);
  const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
  const a = (_noise_p[xi] + yi) & 255, b = (_noise_p[xi + 1] + yi) & 255;
  return (
    _noise_p[a] * (1 - u) * (1 - v) +
    _noise_p[b] * u * (1 - v) +
    _noise_p[(a + 1) & 255] * (1 - u) * v +
    _noise_p[(b + 1) & 255] * u * v
  );
}

class SmokeParticle {
  constructor(x, y, phase) {
    this.reset(x, y, phase);
  }
  reset(x, y, phase) {
    this.x = x + (Math.random() - 0.5) * 20;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 0.6;
    this.vy = -(0.5 + Math.random() * 1.2);
    this.life = 0;
    this.maxLife = 180 + Math.random() * 120;
    this.radius = 8 + Math.random() * 18;
    this.maxRadius = 40 + Math.random() * 80;
    this.alpha = 0;
    this.noiseOffset = Math.random() * 100;
    this.phase = phase || 0; // 0=thin, 1=thick/expand
    this.color = `rgba(${200 + Math.random() * 30},${195 + Math.random() * 20},${185 + Math.random() * 20}`;
  }
  update(t) {
    this.life++;
    const n = noise(this.x * 0.008 + this.noiseOffset, t * 0.003);
    this.vx += (n - 0.5) * 0.18;
    this.vy -= 0.018;
    this.vx *= 0.97;
    this.x += this.vx;
    this.y += this.vy;
    this.radius += (this.maxRadius - this.radius) * 0.012;
    const lt = this.life / this.maxLife;
    if (lt < 0.15) this.alpha = lt / 0.15;
    else if (lt > 0.7) this.alpha = (1 - lt) / 0.3;
    else this.alpha = 1;
    this.alpha *= (this.phase === 1 ? 0.22 : 0.12);
  }
  draw(ctx) {
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
    grd.addColorStop(0, `${this.color},${this.alpha})`);
    grd.addColorStop(1, `${this.color},0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  }
  isDead() { return this.life >= this.maxLife; }
}

const smokeParticles = [];
let smokeActive = false;
let smokePhase = 0; // 0=thin trail, 1=thick expansion
let smokeOriginX = 0, smokeOriginY = 0;
let t = 0;
let smokeGlobalAlpha = 0;

function spawnSmoke() {
  if (!smokeActive) return;
  const rate = smokePhase === 0 ? 1 : 3;
  for (let i = 0; i < rate; i++) {
    smokeParticles.push(new SmokeParticle(smokeOriginX, smokeOriginY, smokePhase));
  }
}

function drawSmoke() {
  ctx.clearRect(0, 0, W, H);
  canvas.style.opacity = smokeGlobalAlpha;
  t++;
  spawnSmoke();
  for (let i = smokeParticles.length - 1; i >= 0; i--) {
    smokeParticles[i].update(t);
    smokeParticles[i].draw(ctx);
    if (smokeParticles[i].isDead()) smokeParticles.splice(i, 1);
  }
  requestAnimationFrame(drawSmoke);
}
drawSmoke();

// ─── DOM REFS ─────────────────────────────────────────────────────────────────
const cigWrap     = document.getElementById('cigarette-wrap');
const cigSVG      = document.getElementById('cigarette-svg');
const cigTip      = document.getElementById('cig-tip');
const cigAsh      = document.getElementById('cig-ash');
const cigPaper    = document.getElementById('cig-paper');
const humanWrap   = document.getElementById('human-wrap');
const emberGlow   = document.getElementById('ember-glow');
const warningText = document.getElementById('warning-text');
const spotlight   = document.getElementById('spotlight');
const labelNum    = document.getElementById('label-num');
const labelTitle  = document.getElementById('label-title');
const sceneLabel  = document.getElementById('scene-label');
const scrollHint  = document.getElementById('scroll-hint');
const progDots    = document.querySelectorAll('.prog-dot');

    // ─── CIGARETTE STATE ──────────────────────────────────────────────────────────
let rotationAngle = 0;        // CSS Y rotation degrees
let cigX = 0, cigY = 0;       // translation from center
let cigScale = 1;
let burnProgress = 0;         // 0..1 how burnt the cigarette is
let morphProgress = 0;        // 0..1 current morph step
let morphStep = 0;            // which brand variant 0-4
let emberIntensity = 0;       // 0..1

// Brand color palettes for morphing
const brandColors = [
  { filter: '#c8a06a', paper: '#f0ece0', band: '#b07830' }, // default
  { filter: '#b8403a', paper: '#f0ece0', band: '#8a2820' }, // red brand
  { filter: '#1a3a6a', paper: '#eeeae0', band: '#0a2050' }, // blue brand
  { filter: '#4a3020', paper: '#e8e0d0', band: '#302010' }, // dark brand
  { filter: '#888060', paper: '#dedad0', band: '#666050' }, // worn/used
];

// ─── SCENE DATA ───────────────────────────────────────────────────────────────
const scenes = [
  { num: '01', title: 'ONE CIGARETTE. IT STARTS.' },
  { num: '02', title: 'IT CHANGES. AGAIN AND AGAIN.' },
  { num: '03', title: 'IT GOES TO YOU.' },
  { num: '04', title: 'YOU LIGHT IT. YOU INHALE.' },
  { num: '05', title: 'WHAT YOU BREATHE IN, STAYS.' },
  { num: '06', title: 'THE TRUTH REMAINS.' },
];

let currentScene = 0;

function setScene(n) {
  if (n === currentScene) return;
  currentScene = n;
  sceneLabel.style.opacity = '0';
  setTimeout(() => {
    labelNum.textContent = scenes[n].num;
    labelTitle.textContent = scenes[n].title;
    sceneLabel.style.opacity = n < 5 ? '1' : '0';
  }, 300);
  progDots.forEach((d, i) => d.classList.toggle('active', i === n));
}

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
let raf;
let rafT = 0;

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function easeInOut(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

// Apply all transforms to cigarette
function applyCigTransform() {
  cigWrap.style.transform = `translate(${cigX}px, ${cigY}px) scale(${cigScale})`;
  cigSVG.style.transform = `rotateY(${rotationAngle}deg)`;
}

// Update burn/ash appearance
function updateBurn(p) {
  burnProgress = clamp(p, 0, 1);
  const ashH = burnProgress * 130;
  cigAsh.setAttribute('rx', 17);
  cigAsh.setAttribute('ry', clamp(ashH / 2, 0, 60));
  cigAsh.setAttribute('cy', 13 + ashH / 2);
  cigAsh.style.opacity = burnProgress * 0.9;
  // Shorten paper visually
  const paperNewY = 18 + burnProgress * 60;
  const paperNewH = 168 - burnProgress * 60;
  cigPaper.setAttribute('y', paperNewY);
  cigPaper.setAttribute('height', Math.max(paperNewH, 30));
}

// Update brand colors
function updateBrandColor(from, to, t) {
  const f = brandColors[from];
  const tk = brandColors[to];
  function blendHex(h1, h2, t) {
    const c1 = hexToRgb(h1), c2 = hexToRgb(h2);
    return `rgb(${Math.round(lerp(c1[0],c2[0],t))},${Math.round(lerp(c1[1],c2[1],t))},${Math.round(lerp(c1[2],c2[2],t))})`;
  }
  // Update SVG gradients dynamically
  document.querySelector('#filterGrad stop:first-child').setAttribute('stop-color', blendHex(f.filter, tk.filter, t));
  document.querySelector('#filterGrad stop:last-child').setAttribute('stop-color', blendHex(f.band, tk.band, t));
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

// Ember glow
function updateEmber(intensity, x, y) {
  emberGlow.style.opacity = intensity;
  emberGlow.style.left = (x - 30) + 'px';
  emberGlow.style.top = (y - 30) + 'px';
}

function onScroll() {
  const scrollY = window.scrollY;
  const p = clamp(scrollY / TOTAL_SCROLL, 0, 1); // 0..1 global progress

  // Scene boundaries (each scene = 1/6)
  const s = p * 6; // 0..6
  const sceneIdx = Math.min(Math.floor(s), 5);
  const sceneP = s - sceneIdx; // 0..1 within scene

  setScene(sceneIdx);

  // Hide scroll hint after first scroll
  if (scrollY > 50) scrollHint.style.opacity = '0';
  else scrollHint.style.opacity = '1';

  // ── SCENE 0: Rotation ─────────────────────────────────────────────────
  if (sceneIdx === 0) {
    const r = easeInOut(sceneP);
    rotationAngle = sceneP * 720; // continuous 2 full rotations
    cigX = 0; cigY = 0; cigScale = 1;
    updateBurn(0);
    updateBrandColor(0, 0, 0);
    humanWrap.style.opacity = '0';
    humanWrap.style.transform = 'translateX(60px)';
    emberIntensity = 0;
    smokeActive = false;
    smokeGlobalAlpha = 0;
    warningText.style.opacity = '0';
    warningText.style.filter = '';
    spotlight.style.background = 'radial-gradient(ellipse 60% 70% at 50% 55%, #1a1510 0%, #0a0a0a 70%)';
  }

  // ── SCENE 1: Brand transformation (morph) ─────────────────────────────
  else if (sceneIdx === 1) {
    rotationAngle = 720 + sceneP * 1440; // keeps spinning
    cigX = 0; cigY = 0; cigScale = 1;
    const step = sceneP * 4;
    const fromBrand = Math.min(Math.floor(step), 3);
    const toBrand = Math.min(fromBrand + 1, 4);
    const morphT = easeInOut(step - fromBrand);
    updateBrandColor(fromBrand, toBrand, morphT);
    updateBurn(sceneP * 0.25);
    humanWrap.style.opacity = '0';
    emberIntensity = 0;
    smokeActive = false;
    smokeGlobalAlpha = 0;
    warningText.style.opacity = '0';
    spotlight.style.background = 'radial-gradient(ellipse 60% 70% at 50% 55%, #1a1510 0%, #0a0a0a 70%)';
  }

  // ── SCENE 2: Cigarette moves toward human ─────────────────────────────
  else if (sceneIdx === 2) {
    const ep = easeOut(sceneP);
    // Move right and slightly down toward mouth area
    const targetX = window.innerWidth * 0.28;
    const targetY = window.innerHeight * 0.08;
    cigX = ep * targetX;
    cigY = ep * targetY;
    // Slow down rotation
    rotationAngle = 720 + 1440 - ep * 1440 + sceneP * 180;
    cigScale = lerp(1, 0.7, ep);
    updateBurn(lerp(0.25, 0.4, sceneP));
    updateBrandColor(4, 4, 0);
    // Fade in human
    humanWrap.style.opacity = easeOut(sceneP);
    humanWrap.style.transform = `translateX(${lerp(60, 0, ep)}px)`;
    emberIntensity = 0;
    smokeActive = false;
    smokeGlobalAlpha = 0;
    warningText.style.opacity = '0';
    spotlight.style.background = `radial-gradient(ellipse ${lerp(60,80,ep)}% ${lerp(70,90,ep)}% at ${lerp(50,65,ep)}% 55%, #1e1812 0%, #0a0a0a 70%)`;
  }

  // ── SCENE 3: Light up + first smoke ───────────────────────────────────
  else if (sceneIdx === 3) {
    const ep = easeInOut(sceneP);
    const targetX = window.innerWidth * 0.28;
    const targetY = window.innerHeight * 0.08;
    cigX = targetX;
    cigY = targetY;
    rotationAngle = sceneP * 15 * Math.sin(sceneP * Math.PI * 3); // subtle breathing
    cigScale = 0.7;
    updateBurn(lerp(0.4, 0.65, sceneP));
    updateBrandColor(4, 4, 0);
    humanWrap.style.opacity = '1';
    humanWrap.style.transform = 'translateX(0)';

    // Ember lighting up
    emberIntensity = sceneP < 0.3 ? easeOut(sceneP / 0.3) : 1;
    // Position ember at cigarette tip
    const cigRect = cigWrap.getBoundingClientRect();
    const ex = cigRect.left + cigRect.width / 2;
    const ey = cigRect.top + 10 * cigScale;
    updateEmber(emberIntensity * 0.9, ex, ey);

    // Start thin smoke
    if (sceneP > 0.2) {
      smokeActive = true;
      smokePhase = 0;
      smokeGlobalAlpha = (sceneP - 0.2) / 0.8;
      smokeOriginX = ex;
      smokeOriginY = ey;
    } else {
      smokeActive = false;
      smokeGlobalAlpha = 0;
    }
    warningText.style.opacity = '0';
    spotlight.style.background = 'radial-gradient(ellipse 80% 90% at 65% 55%, #201a10 0%, #0a0a0a 70%)';
  }

  // ── SCENE 4: Smoke expansion ───────────────────────────────────────────
  else if (sceneIdx === 4) {
    const ep = easeInOut(sceneP);
    const targetX = window.innerWidth * 0.28;
    const targetY = window.innerHeight * 0.08;
    cigX = targetX;
    cigY = targetY;
    rotationAngle = 0;
    cigScale = lerp(0.7, 0, ep); // cigarette fades out
    cigWrap.style.opacity = (1 - ep);
    updateBurn(0.65);
    // Human fades away
    humanWrap.style.opacity = Math.max(0, 1 - ep * 1.5);
    // Smoke thickens
    smokeActive = true;
    smokePhase = 1;
    smokeGlobalAlpha = Math.min(1, 0.6 + ep * 0.4);
    // Ember fades
    emberIntensity = Math.max(0, 1 - ep * 2);
    const cigRect = cigWrap.getBoundingClientRect();
    updateEmber(emberIntensity * 0.5, cigRect.left + cigRect.width / 2, cigRect.top + 10);
    // Center smoke origin
    smokeOriginX = lerp(cigRect.left + cigRect.width / 2, W / 2, ep);
    smokeOriginY = lerp(cigRect.top + 10, H * 0.6, ep);
    warningText.style.opacity = '0';
    spotlight.style.background = `radial-gradient(ellipse ${lerp(80,100,ep)}% ${lerp(90,100,ep)}% at 50% 50%, #181410 0%, #080808 100%)`;
  }

  // ── SCENE 5: Message formation ─────────────────────────────────────────
  else if (sceneIdx === 5) {
    const ep = easeInOut(sceneP);
    cigWrap.style.opacity = '0';
    humanWrap.style.opacity = '0';
    smokeActive = true;
    smokePhase = 1;
    smokeGlobalAlpha = Math.max(0.3, 1 - ep * 0.5);
    smokeOriginX = W / 2 + (Math.random() - 0.5) * 100;
    smokeOriginY = H * 0.7;
    emberIntensity = 0;
    updateEmber(0, 0, 0);
    // Warning text emerges
    warningText.style.opacity = easeOut(sceneP);
    warningText.style.filter = `blur(${lerp(12, 0, easeOut(sceneP))}px)`;
    spotlight.style.background = 'radial-gradient(ellipse 100% 100% at 50% 50%, #100e0a 0%, #060606 100%)';
    sceneLabel.style.opacity = '0';
  }

  // Reset cigarette opacity on other scenes
  if (sceneIdx < 4) cigWrap.style.opacity = '1';
}

// Also run on load
onScroll();

// ─── RESIZE ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  resizeCanvas();
  onScroll();
});
</script>
</body>
</html>
