<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lung Damage — SMOKING IS INJURIOUS TO HEALTH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="cursor"></div>
<canvas id="three-canvas"></canvas>
<div id="vignette"></div>

<div id="stage-label">
  <div id="stage-num">01</div>
  <div id="stage-title">HEALTHY LUNGS</div>
</div>

<div id="progress-bar">
  <div class="prog-dot active" data-n="01"></div>
  <div class="prog-line"></div>
  <div class="prog-dot" data-n="02"></div>
  <div class="prog-line"></div>
  <div class="prog-dot" data-n="03"></div>
  <div class="prog-line"></div>
  <div class="prog-dot" data-n="04"></div>
</div>

<div id="damage-meter">
  <span id="damage-label">Lung Damage</span>
  <div id="damage-bar-wrap"><div id="damage-bar-fill"></div></div>
</div>

<div id="warning-text">
  <span class="line1">SMOKING IS</span>
  <span class="line2">INJURIOUS TO HEALTH</span>
</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
// ─── CURSOR ───────────────────────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// ─── UI REFS ──────────────────────────────────────────────────────────────────
const stageNum      = document.getElementById('stage-num');
const stageTitle    = document.getElementById('stage-title');
const warningText   = document.getElementById('warning-text');
const damageBarFill = document.getElementById('damage-bar-fill');
const damageLabel   = document.getElementById('damage-label');
const progDots      = document.querySelectorAll('.prog-dot');

const STAGES = [
  { num: '01', title: 'Healthy Lungs',    numColor: '#c8882a', damage: 0   },
  { num: '02', title: 'Mild Damage',      numColor: '#b87030', damage: 30  },
  { num: '03', title: 'Moderate Damage',  numColor: '#a04a20', damage: 60  },
  { num: '04', title: 'Severe Damage',    numColor: '#d63b2f', damage: 100 },
];

function setStageUI(idx) {
  const s = STAGES[idx];
  stageNum.textContent  = s.num;
  stageTitle.textContent = s.title;
  stageNum.style.color = s.numColor;
  stageNum.style.textShadow = `0 0 40px ${s.numColor}88`;
  damageBarFill.style.width = s.damage + '%';
  if (idx === 3) {
    damageLabel.style.color = '#d63b2f';
  } else {
    damageLabel.style.color = '#555';
  }
  progDots.forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });
}
setStageUI(0);

// ─── THREE.JS SETUP ───────────────────────────────────────────────────────────
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060608);
scene.fog = new THREE.FogExp2(0x060608, 0.04);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 0.5, 9);
camera.lookAt(0, 0, 0);

// ─── LIGHTING ─────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffeedd, 0.35);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight(0xffa060, 1.2);
keyLight.position.set(3, 6, 5);
keyLight.castShadow = true;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x4040ff, 0.25);
fillLight.position.set(-4, 2, 3);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xff6a00, 0.0);
rimLight.position.set(0, -3, -4);
scene.add(rimLight);

// ─── LUNG GEOMETRY HELPERS ────────────────────────────────────────────────────
// Each lobe = scaled ellipsoid (SphereGeometry) with custom deformation
function makeLobe(rx, ry, rz, segs) {
  const geo = new THREE.SphereGeometry(1, segs, segs);
  // Flatten bottom slightly, puff top
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const y = pos.getY(i);
    // carve inside face (medial side) flat
    const x = pos.getX(i);
    const z = pos.getZ(i);
    // organic noise deformation
    const noise = Math.sin(x * 4.5 + y * 3.2) * 0.04
                + Math.cos(z * 3.8 + y * 2.9) * 0.03;
    pos.setXYZ(i,
      x * rx * (1 + noise),
      y * ry * (1 + noise * 0.5),
      z * rz * (1 + noise * 0.7)
    );
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();
  return geo;
}

// ─── LUNG MATERIAL ────────────────────────────────────────────────────────────
// We use MeshStandardMaterial and animate its properties via GSAP
const lungMat = new THREE.MeshStandardMaterial({
  color: new THREE.Color(0xff9090),      // healthy pink
  roughness: 0.62,
  metalness: 0.04,
  emissive: new THREE.Color(0x220000),
  emissiveIntensity: 0.08,
});

// ─── BUILD LUNGS ──────────────────────────────────────────────────────────────
const lungGroup = new THREE.Group();
scene.add(lungGroup);

// RIGHT LUNG (viewer's left) – slightly larger
const rightLung = new THREE.Mesh(makeLobe(1.35, 1.9, 1.0, 36), lungMat.clone());
rightLung.position.set(-1.45, 0.1, 0);
rightLung.castShadow = true;
rightLung.receiveShadow = true;
lungGroup.add(rightLung);

// LEFT LUNG – slightly smaller (heart side)
const leftLung = new THREE.Mesh(makeLobe(1.18, 1.75, 0.95, 36), lungMat.clone());
leftLung.position.set(1.45, 0.0, 0);
leftLung.castShadow = true;
leftLung.receiveShadow = true;
lungGroup.add(leftLung);

// Bronchi / trachea (cylinder)
const trachGeo = new THREE.CylinderGeometry(0.13, 0.18, 1.3, 16);
const trachMat = new THREE.MeshStandardMaterial({ color: 0xcc8888, roughness: 0.7 });
const trachea  = new THREE.Mesh(trachGeo, trachMat);
trachea.position.set(0, 1.6, 0);
lungGroup.add(trachea);

// Bronchi branches
function makeBronchus(fromX, toX, fromY, toY) {
  const dir = new THREE.Vector3(toX - fromX, toY - fromY, 0).normalize();
  const len = Math.sqrt((toX-fromX)**2 + (toY-fromY)**2);
  const geo = new THREE.CylinderGeometry(0.07, 0.10, len, 10);
  const mesh = new THREE.Mesh(geo, trachMat.clone());
  mesh.position.set((fromX+toX)/2, (fromY+toY)/2, 0);
  mesh.rotation.z = -Math.atan2(toX - fromX, toY - fromY);
  lungGroup.add(mesh);
  return mesh;
}
makeBronchus(0, -1.45, 1.1, 0.85);
makeBronchus(0,  1.45, 1.1, 0.8 );

// ─── BLACK SPOT SYSTEM ────────────────────────────────────────────────────────
// Small dark spheres scattered over lung surfaces, scaled up over time
const MAX_SPOTS = 90;
const spotGroup = new THREE.Group();
scene.add(spotGroup);

const spotGeo = new THREE.SphereGeometry(0.05, 8, 8);

function makeSpot(lobe) {
  // Random point on lobe surface approximation
  const mat = new THREE.MeshStandardMaterial({
    color: 0x080808,
    roughness: 0.9,
    emissive: new THREE.Color(0x0a0000),
    emissiveIntensity: 0.1,
  });
  const mesh = new THREE.Mesh(spotGeo, mat);

  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  const lx    = lobe === 'right' ? -1.45 : 1.45;
  const rx    = lobe === 'right' ? 1.35  : 1.18;
  const ry    = lobe === 'right' ? 1.9   : 1.75;
  const rz    = lobe === 'right' ? 1.0   : 0.95;

  const r = 0.96; // slightly inside surface
  mesh.position.set(
    lx + rx * r * Math.sin(phi) * Math.cos(theta),
         ry * r * Math.cos(phi) + (lobe === 'right' ? 0.1 : 0),
         rz * r * Math.sin(phi) * Math.sin(theta)
  );
  mesh.scale.setScalar(0.01); // invisible; scaled up by GSAP
  spotGroup.add(mesh);
  return mesh;
}

const spots = [];
for (let i = 0; i < MAX_SPOTS; i++) {
  spots.push(makeSpot(i < MAX_SPOTS / 2 ? 'right' : 'left'));
}

// ─── SMOKE PARTICLE SYSTEM ────────────────────────────────────────────────────
const SMOKE_COUNT = 220;
const smokePositions = new Float32Array(SMOKE_COUNT * 3);
const smokeAlphas    = new Float32Array(SMOKE_COUNT);
const smokeLife      = new Float32Array(SMOKE_COUNT);
const smokeVel       = [];
const smokeMaxLife   = [];

for (let i = 0; i < SMOKE_COUNT; i++) {
  smokeLife[i]    = Math.random(); // stagger
  smokeMaxLife[i] = 80 + Math.random() * 80;
  smokeVel.push({
    x: (Math.random() - 0.5) * 0.015,
    y:  0.008 + Math.random() * 0.012,
    z: (Math.random() - 0.5) * 0.015,
  });
  smokePositions[i*3]   = (Math.random() - 0.5) * 5;
  smokePositions[i*3+1] = (Math.random() - 0.5) * 3;
  smokePositions[i*3+2] = (Math.random() - 0.5) * 2;
  smokeAlphas[i] = 0;
}

const smokeGeo = new THREE.BufferGeometry();
smokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePositions, 3));
smokeGeo.setAttribute('alpha',    new THREE.BufferAttribute(smokeAlphas,    1));

// Custom shader material so each particle fades individually
const smokeMat = new THREE.ShaderMaterial({
  uniforms: {
    uGlobalAlpha: { value: 0.0 },
    uColor:       { value: new THREE.Color(0.55, 0.52, 0.50) },
  },
  vertexShader: `
    attribute float alpha;
    varying float vAlpha;
    void main() {
      vAlpha = alpha;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = clamp(280.0 / -mv.z, 12.0, 90.0);
      gl_Position  = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    uniform float uGlobalAlpha;
    uniform vec3  uColor;
    varying float vAlpha;
    void main() {
      float d = length(gl_PointCoord - vec2(0.5));
      if (d > 0.5) discard;
      float a = smoothstep(0.5, 0.15, d) * vAlpha * uGlobalAlpha;
      gl_FragColor = vec4(uColor, a);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

const smokeParticles = new THREE.Points(smokeGeo, smokeMat);
scene.add(smokeParticles);

let smokeGlobalAlpha  = 0;
let smokeSpawnRadius  = 1.5;

// ─── ANIMATION STATE ─────────────────────────────────────────────────────────
let currentStage      = -1;
let breathScale       = 1.0;   // animated each frame
let breathAmplitude   = 0.045; // reduced as damage grows
let breathSpeed       = 1.0;
let spotsVisible      = 0;     // 0..MAX_SPOTS
let lungDamage        = 0.0;   // 0..1

// Shared refs for GSAP targets
const gsapLungState = { damage: 0, spotCount: 0, breathAmp: 0.045, breathSpeed: 1.0, smokeAlpha: 0, exposure: 1.1 };
const gsapCamState  = { fov: 45, y: 0.5, z: 9 };
