<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lung Damage — SMOKING IS INJURIOUS TO HEALTH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="cursor"></div>
<canvas id="three-canvas"></canvas>
<div id="vignette"></div>

<div id="stage-label">
  <div id="stage-num">01</div>
  <div id="stage-title">HEALTHY LUNGS</div>
</div>

<div id="progress-bar">
  <div class="prog-dot active" data-n="01"></div>
  <div class="prog-line"></div>
  <div class="prog-dot" data-n="02"></div>
  <div class="prog-line"></div>
  <div class="prog-dot" data-n="03"></div>
  <div class="prog-line"></div>
  <div class="prog-dot" data-n="04"></div>
</div>

<div id="damage-meter">
  <span id="damage-label">Lung Damage</span>
  <div id="damage-bar-wrap"><div id="damage-bar-fill"></div></div>
</div>

<div id="warning-text">
  <span class="line1">SMOKING IS</span>
  <span class="line2">INJURIOUS TO HEALTH</span>
</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
// ─── CURSOR ───────────────────────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// ─── UI REFS ──────────────────────────────────────────────────────────────────
const stageNum      = document.getElementById('stage-num');
const stageTitle    = document.getElementById('stage-title');
const warningText   = document.getElementById('warning-text');
const damageBarFill = document.getElementById('damage-bar-fill');
const damageLabel   = document.getElementById('damage-label');
const progDots      = document.querySelectorAll('.prog-dot');

const STAGES = [
  { num: '01', title: 'Healthy Lungs',    numColor: '#c8882a', damage: 0   },
  { num: '02', title: 'Mild Damage',      numColor: '#b87030', damage: 30  },
  { num: '03', title: 'Moderate Damage',  numColor: '#a04a20', damage: 60  },
  { num: '04', title: 'Severe Damage',    numColor: '#d63b2f', damage: 100 },
];

function setStageUI(idx) {
  const s = STAGES[idx];
  stageNum.textContent  = s.num;
  stageTitle.textContent = s.title;
  stageNum.style.color = s.numColor;
  stageNum.style.textShadow = `0 0 40px ${s.numColor}88`;
  damageBarFill.style.width = s.damage + '%';
  if (idx === 3) {
    damageLabel.style.color = '#d63b2f';
  } else {
    damageLabel.style.color = '#555';
  }
  progDots.forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });
}
setStageUI(0);
